<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Variational Method</title>
    <link rel="stylesheet" href="./css/mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1 style="transition: all 0.6s ease;">Introduction to Variational Method</h1>
        </div>
        <div class="content">
            <div id="app">
                <ul class="nav-tabs">
                    <li class="nav-item" :class="{ active: display === 'EL' }"@click="display = 'EL'">
                    Euler-Lagrange
                    </li>
                    <li class="nav-item" :class="{ active: display === 'Example' }"@click="display = 'Example'">
                    Physical Example
                    </li>
                    <li class="nav-item" :class="{ active: display === 'Simulation' }"@click="display = 'Simulation'">
                    Numerical Approach
                    </li>
                    <li>
                    <li class="nav-item" :class="{ active: display === 'Python' }"@click="display = 'Python'">
                    Python Code
                    </li>
                    <li>
                    <li class="nav-item" :class="{ active: display === 'Dynamic' }"@click="display = 'Dynamic'">
                    Dynamic Behavior
                    </li>
                </ul>
                <transition>
                    <component v-bind:is="display"></component>
                </transition>
            </div>
        </div>
    </div>
    <script src="./js/mystyle.js"></script>
</body>
</html>
